services:
    postgres:
        image: postgres:16-alpine
        container_name: skymarktracker-postgres
        restart: unless-stopped
        ports:
            - '5432:5432'
        environment:
            POSTGRES_USER: skymarktracker
            POSTGRES_PASSWORD: skymarktracker_secret
            POSTGRES_DB: skymarktracker
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U skymarktracker']
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: skymarktracker-redis
        restart: unless-stopped
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5

    minio:
        image: minio/minio:latest
        container_name: skymarktracker-minio
        restart: unless-stopped
        command: server /data --console-address ':9001'
        ports:
            - '19000:9000'
            - '19001:9001'
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        volumes:
            - minio_data:/data
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            interval: 10s
            timeout: 5s
            retries: 5

    minio-init:
        image: minio/mc:latest
        container_name: skymarktracker-minio-init
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://minio:9000 minioadmin minioadmin &&
            (mc mb --ignore-existing local/skymark-media) &&
            mc anonymous set download local/skymark-media &&
            echo 'Bucket skymark-media ready'
            "

volumes:
    postgres_data:
    redis_data:
    minio_data:
